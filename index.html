<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Survey Form</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #e8f0fe, #f8fafd);
    color: #202124;
}

.container {
    max-width: 520px;
    margin: 50px auto;
    background: white;
    padding: 30px;
    border-radius: 14px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.12);
}

.header {
    text-align: center;
    border-top: 8px solid #4285f4;
    padding-top: 18px;
}

.header h2 {
    margin-bottom: 8px;
    font-size: 28px;
}

.header p {
    color: #5f6368;
    font-size: 14px;
}

label {
    display: block;
    margin-top: 18px;
    margin-bottom: 6px;
    font-weight: 600;
}

input, select, textarea {
    width: 100%;
    padding: 12px;
    border: 1px solid #dadce0;
    border-radius: 8px;
    font-size: 15px;
    outline: none;
}

input:focus, select:focus, textarea:focus {
    border-color: #4285f4;
    box-shadow: 0 0 0 2px rgba(66,133,244,0.15);
}

.radio-group,
.checkbox-group {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
    margin-top: 8px;
}

.option {
    background: #f8fafd;
    border: 1px solid #dadce0;
    border-radius: 8px;
    padding: 10px 12px;
    font-weight: normal;
}

.option input {
    width: auto;
    margin-right: 6px;
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 24px;
    background: #4285f4;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 17px;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #3367d6;
}

@media (max-width: 600px) {
    .container {
        margin: 20px;
        padding: 22px;
    }
}
</style>
</head>

<body>

<div class="container">
    <div class="header">
        <h2>Google Form</h2>
        <p>Please fill out the form carefully</p>
    </div>

    <form action="https://docs.google.com/forms/d/e/FORM_ID/formResponse" method="POST">

        <label>Full Name</label>
        <input type="text" name="entry.111111111" placeholder="Enter your full name" required>

        <label>Email Address</label>
        <input type="email" name="entry.222222222" placeholder="Enter your email address" required>

        <label>Age</label>
        <input type="number" name="entry.333333333" placeholder="Enter your age" min="10" max="100" required>

        <label>Gender</label>
        <div class="radio-group">
            <label class="option"><input type="radio" name="entry.444444444" value="Male" required> Male</label>
            <label class="option"><input type="radio" name="entry.444444444" value="Female"> Female</label>
            <label class="option"><input type="radio" name="entry.444444444" value="Other"> Other</label>
        </div>

        <label>Favorite Technology</label>
        <select name="entry.555555555" required>
            <option value="">Select technology</option>
            <option value="HTML">HTML</option>
            <option value="CSS">CSS</option>
            <option value="JavaScript">JavaScript</option>
            <option value="Java">Java</option>
        </select>

        <label>Skills Known</label>
        <div class="checkbox-group">
            <label class="option"><input type="checkbox" name="entry.666666666" value="HTML"> HTML</label>
            <label class="option"><input type="checkbox" name="entry.666666666" value="CSS"> CSS</label>
            <label class="option"><input type="checkbox" name="entry.666666666" value="JavaScript"> JavaScript</label>
        </div>

        <label>Feedback</label>
        <textarea name="entry.777777777" rows="4" placeholder="Write your feedback here..." required></textarea>

        <label>Rating</label>
        <select name="entry.888888888" required>
            <option value="">Select rating</option>
            <option value="1">⭐ 1</option>
            <option value="2">⭐⭐ 2</option>
            <option value="3">⭐⭐⭐ 3</option>
            <option value="4">⭐⭐⭐⭐ 4</option>
            <option value="5">⭐⭐⭐⭐⭐ 5</option>
        </select>

        <button type="submit">Submit Response</button>

    </form>
</div>

</body>
</html>
